name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "1"

jobs:
  build-test-scan:
    name: Build, Test, and Scan
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Show .NET info
        run: dotnet --info

      - name: Restore
        run: dotnet restore BuildingBlocks.sln

      - name: Build
        run: dotnet build BuildingBlocks.sln --configuration Release --no-restore -v minimal

      - name: Test
        run: dotnet test BuildingBlocks.sln --configuration Release --no-build -v minimal

      - name: Pack packages
        shell: pwsh
        run: |
          $projects = Get-ChildItem -Path . -Directory -Filter 'BuildingBlocks.*' |
            Where-Object { $_.Name -notlike '*.Tests' } |
            ForEach-Object { Join-Path $_.FullName ($_.Name + '.csproj') }

          foreach ($project in $projects) {
            dotnet pack $project --configuration Release --no-build -v minimal
            if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
            }
          }

      - name: Template smoke test
        shell: pwsh
        run: |
          dotnet new install ./templates/microservice --force

          $output = Join-Path $env:RUNNER_TEMP "Catalog.Api"
          dotnet new bb-microservice -n Catalog.Api -o $output --force

          $project = Join-Path $output "Catalog.Api.csproj"
          $localFeed = Join-Path $PWD "artifacts/packages"
          $nugetConfig = Join-Path $output "NuGet.config"

          @"
          <configuration>
            <packageSources>
              <clear />
              <add key="BuildingBlocksLocal" value="$localFeed" />
              <add key="NuGet" value="https://api.nuget.org/v3/index.json" />
            </packageSources>
          </configuration>
          "@ | Set-Content -Path $nugetConfig

          dotnet restore $project --configfile $nugetConfig
          dotnet build $project --no-restore -v minimal

      - name: Vulnerability scan
        run: dotnet list BuildingBlocks.sln package --vulnerable --include-transitive
