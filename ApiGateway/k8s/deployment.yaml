apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  labels:
    app: api-gateway
    version: v1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
        version: v1
    spec:
      containers:
      - name: api-gateway
        image: api-gateway:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        - name: metrics
          containerPort: 8081
          protocol: TCP
        env:
        - name: ASPNETCORE_ENVIRONMENT
          value: "Production"
        - name: ASPNETCORE_URLS
          value: "http://+:8080"
        - name: Gateway__Authentication__Authority
          valueFrom:
            configMapKeyRef:
              name: api-gateway-config
              key: auth-authority
        - name: Gateway__Authentication__Audience
          valueFrom:
            configMapKeyRef:
              name: api-gateway-config
              key: auth-audience
        - name: Gateway__Cache__ConnectionString
          valueFrom:
            secretKeyRef:
              name: api-gateway-secrets
              key: redis-connection-string
        - name: CacheSettings__RedisConnectionString
          valueFrom:
            secretKeyRef:
              name: api-gateway-secrets
              key: redis-connection-string
        - name: Gateway__Security__AllowedOrigins__0
          valueFrom:
            configMapKeyRef:
              name: api-gateway-config
              key: allowed-origin-1
        - name: Gateway__Security__AllowedOrigins__1
          valueFrom:
            configMapKeyRef:
              name: api-gateway-config
              key: allowed-origin-2
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8080
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8080
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 3
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "sleep 15"]
      terminationGracePeriodSeconds: 30
