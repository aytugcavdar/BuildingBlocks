apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: production

bases:
  - ../../

namePrefix: prod-

commonLabels:
  environment: production

replicas:
  - name: api-gateway
    count: 5

images:
  - name: api-gateway
    newName: your-registry/api-gateway
    newTag: v1.0.0

patchesStrategicMerge:
  - deployment-patch.yaml
  - hpa-patch.yaml

resources:
  - ../../pdb.yaml

configMapGenerator:
  - name: api-gateway-config
    behavior: merge
    literals:
      - auth-authority=https://auth.example.com
      - allowed-origin-1=https://app.example.com
      - allowed-origin-2=https://mobile.example.com
