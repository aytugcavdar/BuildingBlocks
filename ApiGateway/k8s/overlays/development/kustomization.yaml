apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: development

bases:
  - ../../

namePrefix: dev-

commonLabels:
  environment: development

replicas:
  - name: api-gateway
    count: 1

images:
  - name: api-gateway
    newName: your-registry/api-gateway
    newTag: dev

patchesStrategicMerge:
  - deployment-patch.yaml

configMapGenerator:
  - name: api-gateway-config
    behavior: merge
    literals:
      - auth-authority=https://auth-dev.example.com
      - allowed-origin-1=http://localhost:3000
