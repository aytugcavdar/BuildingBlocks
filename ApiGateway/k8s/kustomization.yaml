apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: default

commonLabels:
  app: api-gateway
  managed-by: kustomize

resources:
  - configmap.yaml
  - deployment.yaml
  - service.yaml
  - hpa.yaml
  # Uncomment after creating secrets.yaml from template
  # - secrets.yaml

images:
  - name: api-gateway
    newName: your-registry/api-gateway
    newTag: latest

